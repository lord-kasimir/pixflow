<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Pixflow</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<div id="app">
  <!-- Header -->
  <header id="header">
    <button id="btn-back" class="hdr-btn" onclick="goBack()" style="display:none">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h1 id="title">Pixflow</h1>
    <div class="hdr-right">
      <div class="grid-sizer" id="grid-sizer">
        <button onclick="changeGridSize(-1)" title="Smaller">&#x2212;</button>
        <button onclick="changeGridSize(1)" title="Larger">+</button>
      </div>
      <button id="btn-settings" class="hdr-btn" onclick="showSettings()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </header>

  <!-- Content Area -->
  <main id="content"></main>

  <!-- Fullscreen Viewer -->
  <div id="viewer" class="viewer" style="display:none">
    <div id="viewer-slides" class="viewer-slides"></div>
    <div id="viewer-ui" class="viewer-ui">
      <button class="viewer-close" onclick="closeViewer()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <div id="viewer-counter" class="viewer-counter"></div>
      <div class="viewer-actions">
        <button onclick="toggleSlideshow()" id="btn-slideshow">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button onclick="showInfo()" id="btn-info" style="font-family:Georgia,'Times New Roman',serif;font-size:22px;font-style:italic;font-weight:700">i</button>
        <button onclick="downloadCurrent()" id="btn-download">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4m4-5l5 5 5-5m-5 5V3"/></svg>
        </button>
      </div>

      <!-- Info Panel -->
      <div id="info-panel" class="info-panel" style="display:none">
        <div id="info-content"></div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings" class="modal" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="settings-title"></h2>
        <button onclick="hideSettings()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="settings-body"></div>
    </div>
  </div>
</div>

<script>
// Service Worker deregistrieren (Cache-Probleme beheben)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
</script>
<script src="/js/app.js"></script>
</body>
</html>
